{% extends "base.html" %}
{% block content %}
<style>
.form-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px 24px;
  max-width: 480px;
  margin: 0 auto;
  text-align: center;
}

.form-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.form-card p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

.story-upload-area {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 40px 20px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  margin-bottom: 20px;
}

.story-upload-area:hover { border-color: var(--primary); background: var(--primary-light); }
.story-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.story-upload-area .upload-icon { font-size: 48px; margin-bottom: 10px; }
.story-upload-area .upload-text { font-weight: 600; font-size: 15px; color: var(--text); }
.story-upload-area .upload-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

#storyPreview {
  width: 100%;
  max-height: 300px;
  object-fit: cover;
  border-radius: 14px;
  margin-bottom: 16px;
  display: none;
}
</style>

<div class="form-card">
  <h2>📸 Add Story</h2>
  <p>Stories disappear after 24 hours</p>

  <form method="POST" enctype="multipart/form-data">
    <img id="storyPreview" src="" alt="">

    <div class="story-upload-area" id="uploadArea">
      <div class="upload-icon">📷</div>
      <div class="upload-text">Tap to select photo</div>
      <div class="upload-sub">JPG, PNG, WEBP supported</div>
      <input type="file" name="image" accept="image/*" required onchange="previewStory(this)">
    </div>

    <button type="submit" class="w-full">Share Story ✨</button>
  </form>
</div>

<script>
function previewStory(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      const preview = document.getElementById('storyPreview');
      const area = document.getElementById('uploadArea');
      preview.src = e.target.result;
      preview.style.display = 'block';
      area.style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
  }
}
</script>

{% endblock %}
