{% extends "base.html" %}
{% block content %}
<style>
.form-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px 24px;
  max-width: 540px;
  margin: 0 auto;
}

.form-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }

.avatar-preview {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--primary-light);
  color: var(--primary);
  font-size: 28px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  overflow: hidden;
  border: 3px solid var(--primary);
}

.avatar-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: var(--bg);
  border-radius: 12px;
  margin-bottom: 16px;
}

.toggle-label { font-weight: 600; font-size: 15px; }
.toggle-sub { font-size: 13px; color: var(--muted); }

.switch { position: relative; display: inline-block; width: 48px; height: 27px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; inset: 0; background: var(--border); border-radius: 34px; transition: .3s; }
.slider:before { position: absolute; content: ""; height: 21px; width: 21px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .3s; }
input:checked + .slider { background: var(--primary); }
input:checked + .slider:before { transform: translateX(21px); }

@media (max-width: 480px) {
  .form-card { padding: 22px 16px; }
}
</style>

<div class="form-card">
  <h2>✏️ Edit Profile</h2>

  {% if user.image_file %}
  <div class="avatar-preview"><img src="{{ url_for('static', filename='uploads/' + user.image_file) }}" alt=""></div>
  {% else %}
  <div class="avatar-preview">{{ user.username[0].upper() }}</div>
  {% endif %}

  <form method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" value="{{ user.username }}" required>
    </div>
    <div class="form-group">
      <label>Nickname</label>
      <input type="text" name="nickname" value="{{ user.nickname or '' }}" placeholder="Display name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" value="{{ user.email }}" required>
    </div>
    <div class="form-group">
      <label>Bio</label>
      <textarea name="bio" rows="3" placeholder="Tell people about yourself...">{{ user.bio or '' }}</textarea>
    </div>
    <div class="form-group">
      <label>Profile Photo</label>
      <input type="file" name="image" accept="image/*">
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">🔒 Private Account</div>
        <div class="toggle-sub">Only followers can see your posts</div>
      </div>
      <label class="switch">
        <input type="checkbox" name="is_private" {% if user.is_private %}checked{% endif %}>
        <span class="slider"></span>
      </label>
    </div>

    <button type="submit" class="w-full">Save Changes</button>
  </form>
</div>

{% endblock %}
