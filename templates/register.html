<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Register — ZunoUp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --primary: #6c47ff; --primary-light: #ede9ff; --bg: #f0f2f8; --card: #fff; --text: #1a1a2e; --muted: #8888a8; --border: #e8e8f0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
  .auth-wrap { width: 100%; max-width: 440px; }
  .logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 32px; color: var(--primary); text-align: center; margin-bottom: 8px; letter-spacing: -1px; }
  .tagline { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .auth-card { background: var(--card); border-radius: 24px; padding: 36px 32px; box-shadow: 0 8px 40px rgba(108,71,255,0.10); }
  h2 { font-size: 24px; font-weight: 700; margin-bottom: 24px; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input { width: 100%; padding: 14px 16px; font-size: 16px; font-family: 'DM Sans', sans-serif; border: 2px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s; -webkit-appearance: none; }
  input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(108,71,255,0.12); background: white; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .error-msg { background: #ffe9e9; color: #c0392b; padding: 12px 16px; border-radius: 10px; font-size: 14px; font-weight: 500; margin-bottom: 16px; border-left: 4px solid #e74c3c; }
  .submit-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 8px; transition: all 0.2s; min-height: 52px; }
  .submit-btn:hover { background: #5538e0; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,71,255,0.3); }
  .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted); }
  .auth-footer a { color: var(--primary); font-weight: 600; }
  @media (max-width: 480px) { .auth-card { padding: 28px 20px; border-radius: 20px; } }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="logo">ZunoUp</div>
  <p class="tagline">Join ZunoUp 🚀</p>

  <div class="auth-card">
    <h2>Create account ✨</h2>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="yourname" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Nickname <span style="font-weight:400;text-transform:none">(optional)</span></label>
        <input type="text" name="nickname" placeholder="How people see you">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
        <p class="hint">Any email address accepted</p>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a strong password" required autocomplete="new-password">
      </div>
      <button type="submit" class="submit-btn">Continue → Verify Email</button>
      <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:12px">
        📧 We'll send a 6-digit verification code to your email
      </p>
    </form>
  </div>

  <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
</body>
</html>
