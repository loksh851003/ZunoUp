services:
  - type: web
    name: zunoup
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: zunoup-db
          property: connectionString
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_PASSWORD
        sync: false

databases:
  - name: zunoup-db
    databaseName: zunoup
    user: zunoup
    plan: free
